name: Portfolio CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript syntax
        run: node --check script.js

      - name: Verify key portfolio sections exist
        run: |
          test -f index.html
          test -f styles.css
          grep -q 'id="experience"' index.html
          grep -q 'id="projects"' index.html
          grep -q 'id="skills"' index.html
          grep -q 'id="achievements"' index.html
          grep -q 'id="contact"' index.html

      - name: Check clean diff formatting
        run: git diff --check
